<!DOCTYPE html>
<html>
<head>
    <title>Report Generator FINAL</title>
</head>
<body style="font-family: Arial; padding:20px;">

<h2>Transcript to Report Generator</h2>

<label>Select Role:</label><br>
<select id="role">
    <option value="insured">Insured</option>
    <option value="claimant">Claimant</option>
    <option value="witness">Witness</option>
</select><br><br>

<input type="file" id="fileInput"><br><br>

<textarea id="transcript" rows="12" cols="90" placeholder="If docx fails, paste here"></textarea><br><br>

<button onclick="generateReport()">Generate Report</button>

<script>

// =============================
// MAIN
// =============================
function generateReport() {

    const role = document.getElementById("role").value;
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        const text = document.getElementById("transcript").value;
        const cleaned = cleanTranscript(text);
        const report = processTranscript(cleaned, role);
        download(report);
        return;
    }

    // Try reading as text (works if docx exported as plain text internally)
    const reader = new FileReader();

    reader.onload = function(e) {
        const text = e.target.result;

        const cleaned = cleanTranscript(text);
        const report = processTranscript(cleaned, role);
        download(report);
    };

    reader.readAsText(file);
}


// =============================
// CLEAN INPUT
// =============================
function cleanTranscript(text) {
    return text
        .replace(/\[\d{1,2}:\d{2}:\d{2}\]/g, "")
        .replace(/\d{1,2}:\d{2}:\d{2}/g, "")
        .replace(/Speaker \d:/gi, "")
        .replace(/\s+/g, " ")
        .trim();
}


// =============================
// TRANSCRIPT ENGINE
// =============================
function processTranscript(text, role) {

    let sentences = text.split(/(?<=[\?\.\!])\s+/);

    let sections = [];
    let currentQuestion = "";
    let currentAnswer = [];

    function isQuestion(line) {
        const l = line.toLowerCase();
        return (
            l.includes("?") ||
            l.startsWith("what") ||
            l.startsWith("when") ||
            l.startsWith("where") ||
            l.startsWith("why") ||
            l.startsWith("how") ||
            l.startsWith("did") ||
            l.startsWith("were")
        );
    }

    sentences.forEach(line => {

        if (isQuestion(line)) {

            if (currentQuestion && currentAnswer.length > 0) {
                sections.push({ q: currentQuestion, a: currentAnswer.join(" ") });
            }

            currentQuestion = line;
            currentAnswer = [];

        } else {
            currentAnswer.push(line);
        }

    });

    if (currentQuestion && currentAnswer.length > 0) {
        sections.push({ q: currentQuestion, a: currentAnswer.join(" ") });
    }

    return buildReport(sections, role);
}


// =============================
// LANGUAGE ENGINE
// =============================
function formatQA(q, a, role) {

    const qLower = q.toLowerCase();
    const aLower = a.toLowerCase();

    let verb = "stated that";
    if (a.split(" ").length > 30) verb = "explained that";

    if (qLower.includes("in your own words")) {
        return `In describing the incident, the ${role} ${verb} ${a}.`;
    }

    if (aLower === "yes") {
        return `The ${role} confirmed that ${q.replace("?", "").toLowerCase()}.`;
    }

    if (aLower === "no") {
        return `The ${role} stated that ${q.replace("?", "").toLowerCase()} did not occur.`;
    }

    return `The ${role} ${verb} ${a}.`;
}


// =============================
// BUILD REPORT
// =============================
function buildReport(sections, role) {

    let report = "";
    let paragraph = "";

    sections.forEach((item, i) => {

        paragraph += formatQA(item.q, item.a, role) + " ";

        if ((i + 1) % 3 === 0) {
            report += paragraph.trim() + "\n\n";
            paragraph = "";
        }
    });

    if (paragraph) report += paragraph.trim();

    return report;
}


// =============================
// DOWNLOAD (ALWAYS WORKS)
// =============================
function download(text) {

    const html = `
    <html>
    <head><meta charset="UTF-8"></head>
    <body style="font-family:Calibri; font-size:11pt;">
    ${text.replace(/\n/g, "<br><br>")}
    </body>
    </html>
    `;

    const blob = new Blob(['\ufeff', html], { type: "application/msword" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "REPORT.doc";
    link.click();
}

</script>

</body>
</html>
