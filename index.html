<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docx Reader</title>

    <!-- Prevent search engines -->
    <meta name="robots" content="noindex, nofollow">

    <!-- Mammoth library for .docx -->
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            font-size: 22px;
        }

        #output {
            white-space: pre-wrap;
            background: white;
            padding: 15px;
            margin-top: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
            max-height: 500px;
            overflow-y: auto;
        }

        input {
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>Upload .docx File</h1>

<input type="file" id="fileInput" accept=".docx">

<div id="output">Your text will appear here...</div>

<script>
document.getElementById("fileInput").addEventListener("change", function(event) {
    const file = event.target.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        mammoth.extractRawText({ arrayBuffer: event.target.result })
            .then(function(result) {
                document.getElementById("output").textContent = result.value;
            })
            .catch(function(err) {
                document.getElementById("output").textContent = "Error reading file.";
                console.error(err);
            });
    };

    reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
